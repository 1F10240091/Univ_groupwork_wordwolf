{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Sent{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/register.css' %}">
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="content-card card">
            <div class="card-body text-center">
                <h1 class="page-title">メール送信完了</h1>
                
                <p class="mb-4">
                    パスワードリセットの手順を記載したメールを送信しました。<br>
                    メールをご確認の上、手続きを進めてください。
                </p>
                
                <p class="text-muted small">
                    メールが届かない場合は、迷惑メールフォルダをご確認いただくか、<br>
                    入力したメールアドレスが正しいかご確認ください。
                </p>

                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-outline-secondary">ログイン画面へ戻る</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

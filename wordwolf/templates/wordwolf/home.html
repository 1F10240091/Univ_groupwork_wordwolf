{% extends 'base.html' %}

{% block title %}Home - WordWolf{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="content-card card">
            <div class="card-body">
                <h1 class="page-title">WordWolf</h1>

                {% if user.is_authenticated %}
                    <p class="lead mb-4">Hi, <strong>{{ user.username }}</strong>!</p>
                    
                    <div class="d-grid mb-3">
                        <a href="{% url 'wordwolf:lobby' %}" class="btn btn-accent">ロビーに進む</a>
                    </div>

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <div class="d-grid">
                            <button type="submit" class="btn btn-outline-danger">ログアウト</button>
                        </div>
                    </form>
                {% else %}
                    <p class="mb-4">ログインしてください</p>
                    <div class="d-grid mb-3">
                        <a href="{% url 'login' %}" class="btn btn-accent">ログイン</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

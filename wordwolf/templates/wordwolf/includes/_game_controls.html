<div class="game-controls p-3 border-top flex-shrink-0">
    <div class="input-group mb-3">
        <input type="text" id="chat-input" class="form-control" placeholder="発言を入力...">
        <button id="send-chat-btn" class="btn btn-primary" type="button">発言</button>
    </div>
    
    <div class="d-flex justify-content-end align-items-center gap-2">
        <!-- 議論終了/投票へ移動ボタン (初期状態は非表示、JSで制御) -->
        <button id="force-vote-btn" class="btn btn-warning me-auto d-none">
            <i class="bi bi-person-check-fill"></i> 投票へ進む
        </button>

        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#settingsModal">設定</button>
        <button class="btn btn-secondary" data-bs-toggle="modal" data-bs-target="#rulesModal">ルール確認</button>
        <button class="btn btn-danger" id="exit-room-btn">退出</button>
    </div>
</div>

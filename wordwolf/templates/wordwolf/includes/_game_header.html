<header class="game-header p-3 border-bottom flex-shrink-0">
    <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <!-- スマホ用メニューボタン -->
            <button class="btn btn-outline-secondary d-md-none me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas" aria-controls="sidebarOffcanvas">
                ☰
            </button>
            <div id="current-topic">
                <h3 class="mb-0 fs-5">💡<span id="topic-text">議論開始</span></h3>
            </div>
        </div>
        
        <div id="my-word" class="mx-2 mx-md-4 d-none d-sm-flex flex-column flex-lg-row align-items-center justify-content-center">
            <div id="theme-display-area" class="js-theme-area d-none mb-1 mb-lg-0 me-lg-3 text-nowrap">
                <span>テーマ: <span id="theme-display" class="js-theme-display fw-bold text-info"></span></span>
                <span class="d-none d-lg-inline text-secondary mx-2">|</span>
            </div>
            <div class="text-nowrap">
                自分のお題: 
                <span id="word-display" class="js-word-display fw-bold fs-5 text-warning">???</span>
            </div>
        </div>
        
        <div id="time-limit">
            <h4 class="text-danger mb-0 fs-5"><span class="d-none d-sm-inline">残り時間: </span><span id="time-display">00:00</span></h4>
        </div>
    </div>
    <!-- スマホ用お題表示 (ヘッダー下部に表示) -->
    <div class="d-sm-none mt-2 text-center small text-muted">
        <span id="theme-display-mobile-area" class="js-theme-area d-none me-2">
            テーマ: <span id="theme-display-mobile" class="js-theme-display fw-bold text-info"></span>
        </span>
        自分のお題: <span id="word-display-mobile" class="js-word-display fw-bold text-white">???</span>
    </div>
</header>
